name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-demo:${{ github.run_number }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/flask-demo:${{ github.run_number }} \
                     ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-demo:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest

            docker rm -f flask-demo || true

            docker run -d \
              --name flask-demo \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/flask-demo:latest
